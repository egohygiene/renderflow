name: CI

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose

  release-binaries:
    name: Release binary (${{ matrix.target }})
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_name: renderflow-linux-x86_64
            binary: target/x86_64-unknown-linux-gnu/release/renderflow
          - target: aarch64-unknown-linux-gnu
            artifact_name: renderflow-linux-aarch64
            binary: target/aarch64-unknown-linux-gnu/release/renderflow
          - target: x86_64-pc-windows-gnu
            artifact_name: renderflow-windows-x86_64.exe
            binary: target/x86_64-pc-windows-gnu/release/renderflow.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary
        run: cross build --target ${{ matrix.target }} --release

      - name: Rename binary
        shell: bash
        run: cp ${{ matrix.binary }} ${{ matrix.artifact_name }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}

  package-deb:
    name: Package .deb (x86_64)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"

      - name: Install cargo-deb
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb

      - name: Build release binary
        run: cargo build --release

      - name: Build .deb package
        run: cargo deb --no-build

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: renderflow-deb-x86_64
          path: target/debian/*.deb

      - name: Upload .deb to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/debian/*.deb
