name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: >
          Explicit version to set (e.g. 0.2.0).
          Takes precedence over the bump level below.
        required: false
        type: string
      bump:
        description: >
          Semver bump level — used only when no explicit version is provided above.
        required: false
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

jobs:
  bump-version:
    name: Bump version and push tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"

      - name: Resolve new version
        id: ver
        run: |
          EXPLICIT="${{ github.event.inputs.version }}"
          BUMP="${{ github.event.inputs.bump }}"

          # Read current version from Cargo.toml
          CURRENT=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ -n "$EXPLICIT" ]; then
            NEW="$EXPLICIT"
          else
            case "$BUMP" in
              major) NEW="$((MAJOR + 1)).0.0" ;;
              minor) NEW="${MAJOR}.$((MINOR + 1)).0" ;;
              patch) NEW="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
              *) echo "Unknown bump level: $BUMP" && exit 1 ;;
            esac
          fi

          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "new=${NEW}"         >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW}"        >> "$GITHUB_OUTPUT"
          echo "Bumping ${CURRENT} → ${NEW}"

      - name: Update version in Cargo.toml
        run: |
          VERSION="${{ steps.ver.outputs.new }}"
          # Replace the first occurrence of version = "..." (the [package] version)
          python3 - <<'EOF'
          import re, sys

          version = "${{ steps.ver.outputs.new }}"
          with open("Cargo.toml") as f:
              content = f.read()
          content = re.sub(
              r'^version = "[^"]*"',
              f'version = "{version}"',
              content,
              count=1,
              flags=re.MULTILINE,
          )
          with open("Cargo.toml", "w") as f:
              f.write(content)
          print(f"Updated Cargo.toml to {version}")
          EOF

      - name: Update version in package manifests
        run: |
          VERSION="${{ steps.ver.outputs.new }}"
          TAG="${{ steps.ver.outputs.tag }}"

          python3 - <<EOF
          import json, re

          version = "${VERSION}"
          tag     = "${TAG}"

          # Homebrew formula
          with open("Formula/renderflow.rb") as f:
              rb = f.read()
          rb = re.sub(r'archive/refs/tags/v[^/]+\.tar\.gz', f'archive/refs/tags/{tag}.tar.gz', rb)
          with open("Formula/renderflow.rb", "w") as f:
              f.write(rb)

          # Scoop manifest
          with open("pkg/scoop/renderflow.json") as f:
              scoop = json.load(f)
          scoop["version"] = version
          scoop["architecture"]["64bit"]["url"] = (
              f"https://github.com/egohygiene/renderflow/releases/download/{tag}"
              f"/renderflow-x86_64-pc-windows-msvc.exe#/renderflow.exe"
          )
          scoop["architecture"]["64bit"]["hash"] = "PLACEHOLDER"
          with open("pkg/scoop/renderflow.json", "w") as f:
              json.dump(scoop, f, indent=4)
              f.write("\n")

          # Chocolatey nuspec
          with open("pkg/chocolatey/renderflow.nuspec") as f:
              nuspec = f.read()
          nuspec = re.sub(r'<version>[^<]*</version>', f'<version>{version}</version>', nuspec)
          with open("pkg/chocolatey/renderflow.nuspec", "w") as f:
              f.write(nuspec)

          # Chocolatey install script
          with open("pkg/chocolatey/tools/chocolateyinstall.ps1") as f:
              ps1 = f.read()
          ps1 = re.sub(r'PLACEHOLDER_VERSION', tag, ps1)
          with open("pkg/chocolatey/tools/chocolateyinstall.ps1", "w") as f:
              f.write(ps1)

          # AUR PKGBUILD (stable)
          with open("pkg/aur/renderflow/PKGBUILD") as f:
              pkgbuild = f.read()
          pkgbuild = re.sub(r'^pkgver=.*', f'pkgver={version}', pkgbuild, flags=re.MULTILINE)
          pkgbuild = re.sub(r'^pkgrel=.*', 'pkgrel=1',          pkgbuild, flags=re.MULTILINE)
          pkgbuild = re.sub(r"^sha256sums=.*", "sha256sums=('PLACEHOLDER')", pkgbuild, flags=re.MULTILINE)
          with open("pkg/aur/renderflow/PKGBUILD", "w") as f:
              f.write(pkgbuild)

          print(f"Updated all package manifests to {version}")
          EOF

      - name: Update Cargo.lock
        run: cargo update --workspace

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        run: |
          git add Cargo.toml Cargo.lock \
            Formula/renderflow.rb \
            pkg/scoop/renderflow.json \
            pkg/chocolatey/renderflow.nuspec \
            pkg/chocolatey/tools/chocolateyinstall.ps1 \
            pkg/aur/renderflow/PKGBUILD
          if git diff --staged --quiet; then
            echo "Nothing changed — version may already be ${{ steps.ver.outputs.new }}"
            exit 0
          fi
          git commit -m "chore(release): bump version to ${{ steps.ver.outputs.tag }}"

      - name: Create annotated tag
        run: |
          git tag -a "${{ steps.ver.outputs.tag }}" \
              -m "chore(release): release ${{ steps.ver.outputs.tag }}"

      - name: Push commit and tag
        run: |
          git push origin ${{ github.event.repository.default_branch }}
          git push origin "${{ steps.ver.outputs.tag }}"
