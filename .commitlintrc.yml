extends:
  - '@commitlint/config-conventional'

rules:
  # Allowed commit types (matches CONTRIBUTING.md)
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - docs
      - refactor
      - test
      - chore
      - perf
      - ci

  # Allowed scopes (matches CONTRIBUTING.md)
  scope-enum:
    - 1
    - always
    - - cli
      - config
      - pipeline
      - strategies
      - transforms
      - assets
      - cache
      - deps
      - template
      - release

  # Summary line must be <= 72 characters
  header-max-length:
    - 2
    - always
    - 72

  # Enforce imperative mood is not enforced automatically, but the
  # subject must not end with a period
  subject-full-stop:
    - 2
    - never
    - '.'

  # Type must be lower-case
  type-case:
    - 2
    - always
    - lower-case

  # Scope must be lower-case
  scope-case:
    - 2
    - always
    - lower-case
