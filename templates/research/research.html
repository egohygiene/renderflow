<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title | default(value="Research Paper") }}</title>
    <style>
        /* ── Reset & base ──────────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Georgia", "Times New Roman", serif;
            font-size: 1rem;
            line-height: 1.7;
            color: #1a1a1a;
            background: #ffffff;
        }

        /* ── Page wrapper ──────────────────────────────────────────────────── */
        .page {
            max-width: 780px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        /* ── Title block ───────────────────────────────────────────────────── */
        header.paper-header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #ccc;
        }

        header.paper-header h1 {
            font-size: 1.9rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        header.paper-header .author {
            font-size: 1.05rem;
            color: #333;
            margin-bottom: 0.25rem;
        }

        header.paper-header .date {
            font-size: 0.95rem;
            color: #555;
        }

        /* ── Abstract ──────────────────────────────────────────────────────── */
        .abstract {
            background: #f9f9f9;
            border-left: 4px solid #555;
            padding: 1rem 1.25rem;
            margin: 1.5rem 0 2.5rem;
            font-size: 0.95rem;
        }

        .abstract-label {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            color: #555;
            margin-bottom: 0.4rem;
        }

        /* ── Table of contents ─────────────────────────────────────────────── */
        nav.toc {
            background: #fafafa;
            border: 1px solid #ddd;
            padding: 1rem 1.5rem;
            margin-bottom: 2.5rem;
            font-size: 0.9rem;
        }

        nav.toc h2 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #555;
            margin-bottom: 0.6rem;
            border: none;
        }

        nav.toc ol, nav.toc ul {
            padding-left: 1.2rem;
        }

        nav.toc a {
            color: #1a1a1a;
            text-decoration: none;
        }

        nav.toc a:hover {
            text-decoration: underline;
        }

        /* ── Headings ──────────────────────────────────────────────────────── */
        h1, h2, h3, h4, h5, h6 {
            font-family: "Georgia", serif;
            margin-top: 2rem;
            margin-bottom: 0.6rem;
            line-height: 1.3;
        }

        h1 { font-size: 1.6rem; border-bottom: 1px solid #ccc; padding-bottom: 0.3rem; }
        h2 { font-size: 1.3rem; border-bottom: 1px solid #e0e0e0; padding-bottom: 0.2rem; }
        h3 { font-size: 1.1rem; }
        h4, h5, h6 { font-size: 1rem; font-style: italic; }

        /* ── Body content ──────────────────────────────────────────────────── */
        p { margin-bottom: 1rem; }

        a { color: #1a5276; text-decoration: underline; }
        a:hover { color: #154360; }

        /* ── Lists ─────────────────────────────────────────────────────────── */
        ul, ol { padding-left: 1.5rem; margin-bottom: 1rem; }
        li { margin-bottom: 0.25rem; }

        /* ── Tables ────────────────────────────────────────────────────────── */
        table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 0.5rem 0.75rem;
            text-align: left;
        }

        th {
            background: #f0f0f0;
            font-weight: bold;
        }

        tr:nth-child(even) { background: #fafafa; }

        /* ── Code ──────────────────────────────────────────────────────────── */
        code {
            font-family: "Courier New", Courier, monospace;
            font-size: 0.88em;
            background: #f4f4f4;
            padding: 0.15em 0.35em;
            border-radius: 3px;
        }

        pre {
            background: #f4f4f4;
            border: 1px solid #ddd;
            padding: 1rem;
            overflow-x: auto;
            margin-bottom: 1.5rem;
            border-radius: 4px;
        }

        pre code { background: none; padding: 0; font-size: 0.85em; }

        /* ── Blockquotes ───────────────────────────────────────────────────── */
        blockquote {
            border-left: 4px solid #bbb;
            margin: 1rem 0;
            padding: 0.5rem 1rem;
            color: #555;
            font-style: italic;
        }

        /* ── Figures ───────────────────────────────────────────────────────── */
        figure { margin: 1.5rem 0; text-align: center; }
        figcaption { font-size: 0.88rem; color: #555; margin-top: 0.4rem; }
        img { max-width: 100%; height: auto; }

        /* ── Horizontal rule ───────────────────────────────────────────────── */
        hr { border: none; border-top: 1px solid #ccc; margin: 2rem 0; }

        /* ── Print styles ──────────────────────────────────────────────────── */
        @media print {
            body { font-size: 10pt; }
            .page { max-width: 100%; padding: 0; }
            a { color: inherit; text-decoration: none; }
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="paper-header">
            {% if title %}<h1>{{ title }}</h1>{% endif %}
            {% if author %}<div class="author">{{ author }}</div>{% endif %}
            {% if date %}<div class="date">{{ date }}</div>{% endif %}
        </header>

        {% if abstract %}
        <div class="abstract">
            <div class="abstract-label">Abstract</div>
            {{ abstract }}
        </div>
        {% endif %}

        {{ body }}
    </div>
</body>
</html>
